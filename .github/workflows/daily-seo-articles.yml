name: Daily SEO Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * *"

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore article archive once if needed
        run: |
          python restore_article_archive.py

      - name: Generate daily SEO articles and rebuild dist
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
        run: |
          python run_daily_pipeline.py

      - name: Check for changes
        id: git-check
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push generated content
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add yiyu.db dist agent.py generate_now.py minimax_utils.py run_daily_pipeline.py restore_article_archive.py requirements.txt .github/workflows/daily-seo-articles.yml app.py
          git commit -m "chore: update daily seo articles"
          git push
