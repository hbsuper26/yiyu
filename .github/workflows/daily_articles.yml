name: Daily AI Article Generator

on:
  schedule:
    # 每天北京时间 00:00 执行 (UTC 时间 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许在网页上手动点击运行

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码 (Checkout Code)
      uses: actions/checkout@v3
      with:
        # 使用 PAT 或默认 token 允许推送回仓库
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 配置 Python 环境 (Setup Python)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安装依赖 (Install Dependencies)
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flask flask-frozen requests markdown schedule
        
    - name: 运行 AI Agent 生成文章并打包 (Run Generator)
      env:
        # 这里需要您在 GitHub 仓库设置里配置 Secrets
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
      run: |
        python generate_now.py
        
    - name: 提交并推送到仓库 (Commit and Push)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 强制添加所有变更（包括 yiyu.db 数据库和 dist 静态文件）
        git add yiyu.db dist/
        
        # 如果没有文件改变则跳过提交
        git commit -m "🤖 Auto-generated daily articles & updated dist" || echo "No changes to commit"
        
        # 推送回原分支
        git push
