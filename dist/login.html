<!DOCTYPE html>
<html lang="zh-CN" x-data="loginData()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="isRegister ? t[lang].registerTitle : t[lang].loginTitle">登录 - 以渔数媒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        .gradient-bg {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center">

    <div class="absolute top-6 right-6">
        <button @click="toggleLang()" class="flex items-center space-x-1 px-3 py-1 rounded-full border border-slate-200 bg-white hover:border-blue-400 transition-colors">
            <i class="fas fa-globe text-slate-500"></i>
            <span class="text-sm font-medium text-slate-600" x-text="lang === 'zh' ? 'EN' : '中'"></span>
        </button>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <img src="static/images/logo.png" alt="Logo" class="w-16 h-16 rounded-xl mx-auto mb-4 object-cover">
            <h2 class="text-2xl font-bold text-slate-900" x-text="isRegister ? t[lang].registerTitle : t[lang].loginTitle">欢迎回来</h2>
            <p class="text-slate-500 mt-2 text-sm" x-text="isRegister ? t[lang].registerSubtitle : t[lang].loginSubtitle">请输入您的账号信息</p>
        </div>

        <form @submit.prevent="handleLogin" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" x-text="t[lang].email">邮箱</label>
                <input type="email" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="name@company.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" x-text="t[lang].password">密码</label>
                <input type="password" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="••••••••">
            </div>

            <div x-show="isRegister" x-transition x-cloak>
                <label class="block text-sm font-medium text-slate-700 mb-1" x-text="t[lang].confirmPassword">确认密码</label>
                <input type="password" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between" x-show="!isRegister">
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember" class="ml-2 block text-sm text-slate-600" x-text="t[lang].remember">记住我</label>
                </div>
                <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-500" x-text="t[lang].forgot">忘记密码?</a>
            </div>

            <button type="submit" class="w-full py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white gradient-bg hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all transform hover:-translate-y-0.5" x-text="isRegister ? t[lang].registerBtn : t[lang].loginBtn">
                登录
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <span class="text-slate-500" x-text="isRegister ? t[lang].haveAccount : t[lang].noAccount">还没有账号?</span>
            <button @click="isRegister = !isRegister" class="font-medium text-blue-600 hover:text-blue-500 ml-1" x-text="isRegister ? t[lang].loginLink : t[lang].registerLink">
                立即注册
            </button>
        </div>
        
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
             <a href="index.html" class="text-slate-400 hover:text-slate-600 text-sm flex items-center justify-center gap-2 transition-colors">
                <i class="fas fa-arrow-left"></i>
                <span x-text="t[lang].backHome">返回首页</span>
             </a>
        </div>
    </div>

    <script>
        const translations = {
            zh: {
                loginTitle: "登录平台",
                loginSubtitle: "欢迎回到以渔数媒",
                registerTitle: "注册账户",
                registerSubtitle: "开启您的全球营销之旅",
                email: "工作邮箱",
                password: "密码",
                confirmPassword: "确认密码",
                remember: "记住我",
                forgot: "忘记密码?",
                loginBtn: "登录",
                registerBtn: "注册",
                noAccount: "还没有账号?",
                haveAccount: "已有账号?",
                registerLink: "立即注册",
                loginLink: "直接登录",
                backHome: "返回首页"
            },
            en: {
                loginTitle: "Login",
                loginSubtitle: "Welcome back to Yiyu Digital",
                registerTitle: "Create Account",
                registerSubtitle: "Start your global marketing journey",
                email: "Work Email",
                password: "Password",
                confirmPassword: "Confirm Password",
                remember: "Remember me",
                forgot: "Forgot password?",
                loginBtn: "Sign In",
                registerBtn: "Sign Up",
                noAccount: "No account yet?",
                haveAccount: "Already have an account?",
                registerLink: "Sign up",
                loginLink: "Sign in",
                backHome: "Back to Home"
            }
        };

        function loginData() {
            return {
                lang: 'zh',
                isRegister: window.location.pathname.includes('register'),
                t: translations,
                toggleLang() {
                    this.lang = this.lang === 'zh' ? 'en' : 'zh';
                },
                handleLogin() {
                    // Simulate login
                    const btn = this.$el.querySelector('button[type="submit"]');
                    const originalText = btn.innerText;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                    btn.disabled = true;
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
